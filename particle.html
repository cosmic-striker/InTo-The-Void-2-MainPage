<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARTICLE_MATRIX // Into The Void 2.0</title>
    <meta name="description" content="Interactive particle matrix visualization for Into The Void 2.0 cybersecurity event">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --cyan: #00dbe9;
            --magenta: #d05bff;
            --red: #ff003c;
            --cyan-glow: rgba(0, 219, 233, 0.6);
            --magenta-glow: rgba(208, 91, 255, 0.6);
            --font-code: 'JetBrains Mono', monospace;
            --font-display: 'Space Grotesk', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            background: var(--bg);
            overflow: hidden;
            cursor: crosshair;
            font-family: var(--font-code);
        }

        /* CRT Scanlines */
        .scanlines {
            position: fixed; inset: 0;
            background: repeating-linear-gradient(to bottom, transparent 0, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
            pointer-events: none; z-index: 50; opacity: 0.4;
        }

        /* Vignette */
        .vignette {
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.85) 130%);
            pointer-events: none; z-index: 51;
        }

        /* Main Canvas */
        #particle-canvas {
            position: fixed; inset: 0;
            z-index: 1;
            background-image:
                linear-gradient(rgba(0, 219, 233, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 219, 233, 0.02) 1px, transparent 1px);
            background-size: 48px 48px;
        }

        /* HUD Overlay */
        .hud {
            position: fixed; inset: 2rem;
            z-index: 40; pointer-events: none;
            display: flex; flex-direction: column;
            justify-content: space-between;
            font-family: var(--font-code);
            font-size: 10px;
            color: rgba(255,255,255,0.45);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .hud-row {
            display: flex; justify-content: space-between;
            align-items: center; width: 100%;
        }

        .hud strong { color: var(--cyan); }
        .hud .val-magenta { color: var(--magenta); }

        .hud-line {
            flex: 1; height: 1px;
            background: rgba(255,255,255,0.15);
            margin: 0 1rem; position: relative;
        }
        .hud-line::after {
            content: ''; position: absolute;
            right: -1px; top: -2px;
            width: 5px; height: 5px;
            background: var(--red);
        }

        .hud-side {
            align-self: flex-start; margin: auto 0;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
        }

        /* Back Button */
        .back-btn {
            position: fixed; top: 2rem; right: 2rem;
            z-index: 60; pointer-events: all;
            color: var(--red);
            font-family: var(--font-code);
            font-size: 11px; text-decoration: none;
            border: 1px solid var(--red);
            padding: 8px 16px;
            letter-spacing: 0.1em;
            transition: 0.3s;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
        }
        .back-btn:hover {
            background: var(--red); color: #000;
        }

        /* Slide Selector */
        .slide-nav {
            position: fixed; right: 2rem; top: 50%;
            transform: translateY(-50%);
            z-index: 60;
            display: flex; flex-direction: column;
            gap: 8px;
        }
        .slide-dot {
            width: 8px; height: 8px;
            border: 1px solid rgba(255,255,255,0.3);
            background: transparent;
            cursor: pointer;
            transition: 0.3s;
            padding: 0;
        }
        .slide-dot.active {
            background: var(--cyan);
            border-color: var(--cyan);
            box-shadow: 0 0 10px var(--cyan-glow);
        }
        .slide-dot:hover {
            border-color: var(--cyan);
        }

        /* Title overlay */
        .title-overlay {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 30; pointer-events: none;
            text-align: center;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        .title-overlay.visible { opacity: 1; }
        .title-overlay h1 {
            font-family: var(--font-display);
            font-size: clamp(24px, 5vw, 56px);
            font-weight: 700;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255,255,255,0.12);
            letter-spacing: -0.03em;
            line-height: 1;
        }
        .title-overlay .sub {
            font-family: var(--font-code);
            font-size: 10px;
            color: var(--cyan);
            letter-spacing: 0.2em;
            margin-top: 12px;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .controls { bottom: 1rem; padding: 8px 12px; gap: 8px; }
            .ctrl-group input[type="range"] { width: 50px; }
            .hud { inset: 1rem; font-size: 8px; }
            .slide-nav { right: 1rem; }
        }
    </style>
</head>

    <!-- Canvas -->
    <canvas id="particle-canvas"></canvas>



    <script>
    (function () {
        'use strict';

        // ── IMAGE SLIDES ──────────────────────────────────────
        const slideImages = [];       // loaded Image objects
        let currentSlide = 0;
        let slidesReady = false;

        // ── CONFIG ────────────────────────────────────────────
        let ptlGap = 0;
        let ptlSize = 2;
        let restless = false;
        let monochrome = false;
        let monoColor = [0, 219, 233];

        // ── CANVAS SETUP ──────────────────────────────────────
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        let lastW = window.innerWidth;
        window.addEventListener('resize', () => {
            const newW = window.innerWidth;
            if (Math.abs(newW - lastW) > 50) {
                lastW = newW;
                resize();
                if (slidesReady) buildSlide();
            } else {
                resize(); // Just update canvas dimensions, don't reset particles
            }
        });

        // ── MOUSE ─────────────────────────────────────────────
        let mouseX = -9999, mouseY = -9999;
        let mouseRadius = 180;
        let isTouch = false;

        canvas.addEventListener('mousemove', e => {
            mouseX = e.clientX; mouseY = e.clientY;
        });
        canvas.addEventListener('mouseleave', () => {
            mouseX = -9999; mouseY = -9999;
        });
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            isTouch = true;
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });
        canvas.addEventListener('touchend', () => {
            mouseX = -9999; mouseY = -9999;
        });

        canvas.addEventListener('click', () => {
            if (!slidesReady) return;
            currentSlide = (currentSlide + 1) % slideImages.length;
            buildSlide();
            updateSlideNav();
        });

        // ── PARTICLES ─────────────────────────────────────────
        let particles = [];

        class Particle {
            constructor(targetX, targetY, r, g, b) {
                this.tx = targetX;
                this.ty = targetY;
                this.x = Math.random() * W;
                this.y = Math.random() * H;
                this.vx = 0;
                this.vy = 0;
                this.r = r; this.g = g; this.b = b;
                this.origR = r; this.origG = g; this.origB = b;
                this.size = ptlSize;
                this.friction = 0.88 + Math.random() * 0.07;
                this.springFactor = 0.04 + Math.random() * 0.03;
            }

            update() {
                let dx = this.tx - this.x;
                let dy = this.ty - this.y;

                this.vx += dx * this.springFactor;
                this.vy += dy * this.springFactor;

                // Mouse repulsion
                let mdx = this.x - mouseX;
                let mdy = this.y - mouseY;
                let dist = Math.sqrt(mdx * mdx + mdy * mdy);
                let effectiveRadius = mouseRadius + (isTouch ? 40 : 0);

                if (dist < effectiveRadius && dist > 0) {
                    let force = (effectiveRadius - dist) / effectiveRadius;
                    force *= force * 14;
                    this.vx += (mdx / dist) * force;
                    this.vy += (mdy / dist) * force;
                }

                if (restless) {
                    this.vx += (Math.random() - 0.5) * 1.5;
                    this.vy += (Math.random() - 0.5) * 1.5;
                }

                this.vx *= this.friction;
                this.vy *= this.friction;
                this.x += this.vx;
                this.y += this.vy;

                // Use original image colors
                this.r = this.origR;
                this.g = this.origG;
                this.b = this.origB;
                this.size = ptlSize;
            }

            draw(buf, w, h) {
                const px = this.x | 0;
                const py = this.y | 0;
                if (px < 0 || py < 0 || px >= w || py >= h) return;
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                const alpha = Math.min(255, (0.6 + speed * 0.08) * 255) | 0;
                const sz = this.size | 0;
                const half = (sz >> 1);
                for (let dy = -half; dy < sz - half; dy++) {
                    const ry = py + dy;
                    if (ry < 0 || ry >= h) continue;
                    for (let dx = -half; dx < sz - half; dx++) {
                        const rx = px + dx;
                        if (rx < 0 || rx >= w) continue;
                        const idx = (ry * w + rx) * 4;
                        buf[idx]     = Math.min(255, buf[idx] + this.r);
                        buf[idx + 1] = Math.min(255, buf[idx + 1] + this.g);
                        buf[idx + 2] = Math.min(255, buf[idx + 2] + this.b);
                        buf[idx + 3] = Math.min(255, buf[idx + 3] + alpha);
                    }
                }
            }
        }

        // ── IMAGE → PIXEL DATA ────────────────────────────────
        function getImagePixels(img) {
            const offCanvas = document.createElement('canvas');
            const offCtx = offCanvas.getContext('2d');
            offCanvas.width = W;
            offCanvas.height = H;

            // Scale image to fit centered (contain)
            const scale = Math.min((W * 0.7) / img.width, (H * 0.7) / img.height);
            const dw = img.width * scale;
            const dh = img.height * scale;
            const dx = (W - dw) / 2;
            const dy = (H - dh) / 2;

            offCtx.drawImage(img, dx, dy, dw, dh);

            const imageData = offCtx.getImageData(0, 0, W, H);
            const data = imageData.data;
            const pixels = [];
            const gap = ptlGap + 1;
            const step = Math.max(4, Math.ceil(gap * 2.5));

            for (let y = 0; y < H; y += step) {
                for (let x = 0; x < W; x += step) {
                    const i = (y * W + x) * 4;
                    const a = data[i + 3];
                    if (a < 30) continue;

                    let r = data[i];
                    let g = data[i + 1];
                    let b = data[i + 2];

                    // Skip very dark pixels (near-black background)
                    const brightness = r * 0.299 + g * 0.587 + b * 0.114;
                    if (brightness < 15) continue;

                    if (monochrome) {
                        r = monoColor[0];
                        g = monoColor[1];
                        b = monoColor[2];
                    }

                    pixels.push({ x, y, r, g, b });
                }
            }
            return pixels;
        }

        function buildSlide() {
            if (!slideImages.length) return;
            const img = slideImages[currentSlide];
            if (!img) return;

            let pixelData = getImagePixels(img);

            // Cap at 30K particles for performance
            const MAX_PARTICLES = 30000;
            if (pixelData.length > MAX_PARTICLES) {
                // Evenly downsample
                const ratio = Math.ceil(pixelData.length / MAX_PARTICLES);
                pixelData = pixelData.filter((_, i) => i % ratio === 0);
            }

            const oldParticles = particles;
            particles = [];

            for (let i = 0; i < pixelData.length; i++) {
                const p = pixelData[i];
                const particle = new Particle(p.x, p.y, p.r, p.g, p.b);

                // Reuse positions from existing particles for smooth morph
                if (i < oldParticles.length) {
                    particle.x = oldParticles[i].x;
                    particle.y = oldParticles[i].y;
                    particle.vx = oldParticles[i].vx;
                    particle.vy = oldParticles[i].vy;
                }
                particles.push(particle);
            }

            document.getElementById('hud-count').textContent = particles.length;

            const overlay = document.getElementById('title-overlay');
            if (overlay) {
                overlay.classList.add('visible');
                setTimeout(() => overlay.classList.remove('visible'), 3000);
            }
        }

        // ── IMAGE LOADER (from DOM) ────────────────────────────
        function loadAllSlides() {
            const container = document.getElementById('slide-sources');
            const imgs = container.querySelectorAll('img');
            let loaded = 0;
            const total = imgs.length;

            if (total === 0) {
                slidesReady = true;
                requestAnimationFrame(animate);
                return;
            }

            function onReady() {
                loaded++;
                if (loaded >= total) {
                    slidesReady = true;
                    createSlideNav();
                    buildSlide();
                    requestAnimationFrame(animate);
                }
            }

            imgs.forEach(img => {
                slideImages.push(img);
                if (img.complete && img.naturalWidth > 0) {
                    onReady();
                } else {
                    img.addEventListener('load', onReady);
                    img.addEventListener('error', () => {
                        console.warn('Failed to load: ' + img.src);
                        onReady();
                    });
                }
            });
        }

        // ── USER IMAGE UPLOAD ─────────────────────────────────
        function addUserImage(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    slideImages.push(img);
                    currentSlide = slideImages.length - 1;
                    rebuildSlideNav();
                    buildSlide();
                    updateSlideNav();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // ── SLIDE NAV ─────────────────────────────────────────
        function createSlideNav() {
            const nav = document.getElementById('slide-nav');
            nav.innerHTML = '';
            slideImages.forEach((_, i) => {
                const dot = document.createElement('button');
                dot.className = 'slide-dot' + (i === currentSlide ? ' active' : '');
                dot.addEventListener('click', () => {
                    currentSlide = i;
                    buildSlide();
                    updateSlideNav();
                });
                nav.appendChild(dot);
            });
        }

        function rebuildSlideNav() { createSlideNav(); }

        function updateSlideNav() {
            const dots = document.querySelectorAll('.slide-dot');
            dots.forEach((d, i) => {
                d.classList.toggle('active', i === currentSlide);
            });
        }

        // ── RENDER LOOP (ImageData buffer for perf) ─────────────
        let frameCount = 0, fpsTime = 0;
        const elFps = document.getElementById('hud-fps');
        const elMouse = document.getElementById('hud-mouse');

        function animate(t) {
            requestAnimationFrame(animate);

            frameCount++;
            if (t - fpsTime >= 500) {
                elFps.textContent = Math.round(frameCount * 1000 / (t - fpsTime));
                frameCount = 0;
                fpsTime = t;
            }

            if (mouseX > 0 && mouseY > 0) {
                elMouse.textContent = `${Math.round(mouseX)}, ${Math.round(mouseY)}`;
            }

            // Get current frame, apply fade (trail effect)
            const imgData = ctx.getImageData(0, 0, W, H);
            const buf = imgData.data;
            const len = buf.length;
            for (let i = 0; i < len; i += 4) {
                buf[i]     = (buf[i]     * 0.82) | 0;
                buf[i + 1] = (buf[i + 1] * 0.82) | 0;
                buf[i + 2] = (buf[i + 2] * 0.82) | 0;
                buf[i + 3] = (buf[i + 3] * 0.85) | 0;
            }

            // Update physics + draw to buffer
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw(buf, W, H);
            }

            // Single putImageData call
            ctx.putImageData(imgData, 0, 0);

            // Mouse glow (canvas API, only when active)
            if (mouseX > 0 && mouseY > 0) {
                const glowR = mouseRadius * 1.5;
                const grad = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, glowR);
                grad.addColorStop(0, 'rgba(0, 219, 233, 0.15)');
                grad.addColorStop(0.3, 'rgba(208, 91, 255, 0.08)');
                grad.addColorStop(0.6, 'rgba(0, 219, 233, 0.03)');
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.fillRect(mouseX - glowR, mouseY - glowR, glowR * 2, glowR * 2);
            }
        }

        // ── INIT ──────────────────────────────────────────────
        loadAllSlides();

    })();
    </script>
</body>
