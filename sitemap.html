<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Into The Void: Multiverse of the Matrix</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        #gameCanvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #0f0;
            z-index: 10;
            text-shadow: 0 0 5px #0f0;
        }
        #ui h2 {
            margin: 0 0 10px 0;
            font-size: 1.5em;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0f0;
            text-align: center;
            display: none;
            text-shadow: 0 0 10px #0f0;
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border: 2px solid #0f0;
            box-shadow: 0 0 20px #0f0;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
        }
        button {
            background-color: transparent;
            color: #0f0;
            border: 2px solid #0f0;
            padding: 15px 30px;
            font-size: 1.5em;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            text-transform: uppercase;
            transition: all 0.3s;
            box-shadow: 0 0 10px inset #0f0;
        }
        button:hover {
            background-color: #0f0;
            color: #000;
            box-shadow: 0 0 20px #0f0;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h2>INTO THE VOID: MULTIVERSE OF THE MATRIX</h2>
        <h3 id="scoreBoard">SCORE: 0</h3>
        <p>Controls: Arrow Keys / WASD to move, Space to shoot</p>
    </div>

    <div id="gameOver">
        <h1>SYSTEM FAILURE</h1>
        <p>YOU HAVE BEEN CONSUMED BY THE VOID</p>
        <br>
        <button onclick="resetGame()">Reboot System</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreBoard = document.getElementById('scoreBoard');
        const gameOverScreen = document.getElementById('gameOver');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let isGameOver = false;

        // Matrix background setup
        const katakana = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレゲゼデベペオォコソトノホモヨョロゴゾドボポヴッン';
        const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const nums = '0123456789';
        const alphabet = katakana + latin + nums;
        
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];
        for (let x = 0; x < columns; x++) {
            drops[x] = 1;
        }

        // Entities
        const player = {
            x: canvas.width / 2,
            y: canvas.height - 100,
            width: 40,
            height: 40,
            speed: 7,
            color: '#0f0'
        };

        const bullets = [];
        const enemies = [];
        let particles = [];

        // Input handling
        const keys = {
            ArrowLeft: false,
            ArrowRight: false,
            ArrowUp: false,
            ArrowDown: false,
            Space: false
        };

        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.ArrowLeft = true;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.ArrowRight = true;
            if (e.code === 'ArrowUp' || e.code === 'KeyW') keys.ArrowUp = true;
            if (e.code === 'ArrowDown' || e.code === 'KeyS') keys.ArrowDown = true;
            if (e.code === 'Space') keys.Space = true;
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.ArrowLeft = false;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.ArrowRight = false;
            if (e.code === 'ArrowUp' || e.code === 'KeyW') keys.ArrowUp = false;
            if (e.code === 'ArrowDown' || e.code === 'KeyS') keys.ArrowDown = false;
            if (e.code === 'Space') keys.Space = false;
        });

        // Functions
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; // Slightly faster fade
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#0F0';
            ctx.font = fontSize + 'px monospace';
            
            for (let i = 0; i < drops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        function drawPlayer() {
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.moveTo(player.x, player.y - player.height / 2); // Top tip
            ctx.lineTo(player.x + player.width / 2, player.y + player.height / 2); // Bottom right
            ctx.lineTo(player.x, player.y + player.height / 4); // Inner indent
            ctx.lineTo(player.x - player.width / 2, player.y + player.height / 2); // Bottom left
            ctx.closePath();
            
            // Add glow
            ctx.shadowBlur = 15;
            ctx.shadowColor = player.color;
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Core
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(player.x, player.y, 4, 0, Math.PI * 2);
            ctx.fill();
        }

        let lastFire = 0;
        function updatePlayer() {
            if (keys.ArrowLeft && player.x > player.width / 2) player.x -= player.speed;
            if (keys.ArrowRight && player.x < canvas.width - player.width / 2) player.x += player.speed;
            if (keys.ArrowUp && player.y > player.height / 2) player.y -= player.speed;
            if (keys.ArrowDown && player.y < canvas.height - player.height / 2) player.y += player.speed;

            if (keys.Space && Date.now() - lastFire > 150) {
                bullets.push({
                    x: player.x,
                    y: player.y - player.height / 2,
                    speed: 12,
                    radius: 4,
                    color: '#fff'
                });
                lastFire = Date.now();
            }
        }

        function drawBullets() {
            bullets.forEach((b, index) => {
                b.y -= b.speed;
                ctx.fillStyle = b.color;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#0f0';
                ctx.fill();
                ctx.shadowBlur = 0;

                if (b.y < 0) {
                    bullets.splice(index, 1);
                }
            });
        }

        function spawnEnemy() {
            if (Math.random() < 0.05 + (score * 0.00005)) {
                enemies.push({
                    x: Math.random() * (canvas.width - 40) + 20,
                    y: -50,
                    width: 30,
                    height: 30,
                    speed: 2 + Math.random() * 3 + (score * 0.01),
                    color: '#f00',
                    symbol: alphabet.charAt(Math.floor(Math.random() * alphabet.length))
                });
            }
        }

        function drawEnemies() {
            enemies.forEach((e, index) => {
                e.y += e.speed;
                
                // Draw matrix-like enemy
                ctx.fillStyle = e.color;
                ctx.font = 'bold 28px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                ctx.shadowBlur = 15;
                ctx.shadowColor = e.color;
                ctx.fillText(e.symbol, e.x, e.y);
                ctx.shadowBlur = 0;

                if (e.y > canvas.height + 50) {
                    enemies.splice(index, 1);
                }
            });
        }

        function checkCollisions() {
            // Bullet - Enemy collision
            bullets.forEach((b, bIndex) => {
                enemies.forEach((e, eIndex) => {
                    const dist = Math.hypot(b.x - e.x, b.y - e.y);
                    if (dist < 20) {
                        createParticles(e.x, e.y, e.color);
                        bullets.splice(bIndex, 1);
                        enemies.splice(eIndex, 1);
                        score += 10;
                        scoreBoard.innerText = 'SCORE: ' + score;
                    }
                });
            });

            // Player - Enemy collision
            enemies.forEach((e) => {
                const dist = Math.hypot(player.x - e.x, player.y - e.y);
                if (dist < 25) {
                    createParticles(player.x, player.y, player.color);
                    isGameOver = true;
                    gameOverScreen.style.display = 'block';
                }
            });
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 20; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 12,
                    vy: (Math.random() - 0.5) * 12,
                    life: 1,
                    color: color
                });
            }
        }

        function drawParticles() {
            particles.forEach((p, index) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.03;

                ctx.fillStyle = p.color;
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;

                if (p.life <= 0) {
                    particles.splice(index, 1);
                }
            });
        }

        function gameLoop() {
            if (isGameOver) {
                // Keep drawing matrix even when dead
                drawMatrix();
                drawParticles();
                requestAnimationFrame(gameLoop);
                return;
            }

            drawMatrix();
            
            updatePlayer();
            drawPlayer();
            
            drawBullets();
            
            spawnEnemy();
            drawEnemies();
            
            drawParticles();
            checkCollisions();

            requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            score = 0;
            scoreBoard.innerText = 'SCORE: 0';
            isGameOver = false;
            gameOverScreen.style.display = 'none';
            bullets.length = 0;
            enemies.length = 0;
            particles.length = 0;
            player.x = canvas.width / 2;
            player.y = canvas.height - 100;
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Update matrix columns on resize
            const newColumns = canvas.width / fontSize;
            for (let x = drops.length; x < newColumns; x++) {
                drops[x] = Math.random() * canvas.height / fontSize;
            }
        });

        // Start game
        gameLoop();
    </script>
</body>
</html>
